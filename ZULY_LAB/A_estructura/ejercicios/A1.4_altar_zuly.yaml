# Ejercicio A1.4: El Altar de Zuly (Prueba de Render)
# Objetivo: Integración total (Geometría + Materiales + Luz + Cámara + Render)

name: "Altar de Zuly"
fase: "A"
numero: "A1.4"
descripcion: "Escena completa con renderizado final"
dificultad: "avanzado"
tiempo_estimado_segundos: 15

steps:
  - action: "clear_scene"

  # 1. Base (Suelo)
  - action: "create_plane"
    params:
      location: [0, 0, 0]
      scale: 10.0
      name: "Suelo"
  
  - action: "create_material"
    params:
      name: "MatSuelo"
      color: [0.1, 0.1, 0.1, 1.0] # Gris oscuro
      roughness: 0.8
  
  - action: "apply_material"
    params:
      object_name: "Suelo"
      material_name: "MatSuelo"

  # 2. El Monolito (Centro)
  - action: "create_cube"
    params:
      location: [0, 0, 2]
      scale: [1.0, 1.0, 4.0] # Alto y delgado
      name: "Monolito"
  
  - action: "create_material"
    params:
      name: "MatMonolito"
      color: [0.0, 0.8, 1.0, 1.0] # Cyan Zuly
      metallic: 0.8
      roughness: 0.2
  
  - action: "apply_material"
    params:
      object_name: "Monolito"
      material_name: "MatMonolito"

  # 3. Esferas Flotantes (Séquito)
  - action: "create_sphere"
    params:
      location: [3, 3, 2]
      radius: 0.5
      name: "Orbe_1"
  
  - action: "create_sphere"
    params:
      location: [-3, -3, 2]
      radius: 0.5
      name: "Orbe_2"
      
  - action: "apply_material"
    params:
      object_name: "Orbe_1"
      material_name: "MatMonolito" # Reusar material
      
  - action: "apply_material"
    params:
      object_name: "Orbe_2"
      material_name: "MatMonolito"

  # 4. Iluminación (Clave para el render)
  - action: "create_light"
    params:
      light_type: "POINT"
      location: [5, -5, 8]
      energy: 1000.0
      color: [1.0, 1.0, 1.0]
      name: "LuzPrincipal"
      
  - action: "create_light"
    params:
      light_type: "POINT"
      location: [-4, 2, 3]
      energy: 500.0
      color: [1.0, 0.0, 0.5] # Luz de relleno magenta
      name: "LuzRelleno"

  # 5. Cámara (Ojo de Zuly)
  - action: "create_camera"
    params:
      location: [12, -12, 10]
      name: "CamaraPrincipal"
  
  - action: "position_camera"
    params:
      camera_name: "CamaraPrincipal"
      location: [12, -12, 8]
      look_at: [0, 0, 2] # Mirar al centro del monolito
      
  - action: "set_active_camera"
    params:
      camera_name: "CamaraPrincipal"

  # 6. Renderizado (La prueba de fuego)
  - action: "render_scene"
    params:
      output_path: "ZULY_LAB/resultados_zuly/A1.4_render_altar.png"
      resolution: [800, 600]
      samples: 32
      engine: "CYCLES" # O "BLENDER_EEVEE" si prefieres velocidad
      
  # 7. Guardar el proyecto también
  - action: "save_project"
    params:
      filepath: "ZULY_LAB/resultados_zuly/A1.4_altar_completo.blend"

validation:
  - type: "object_exists"
    object_name: "Monolito"
  - type: "object_exists"
    object_name: "CamaraPrincipal"
  - type: "material_applied"
    object_name: "Monolito"
    material_name: "MatMonolito"
  - type: "object_exists"
    object_name: "Suelo" # Corregido: 'Plane' -> 'Suelo'

metrics:
  - "tiempo_total"
  - "pasos_exitosos"

success_criteria:
  min_steps_successful: 15
  all_validations_pass: true
